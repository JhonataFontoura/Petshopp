<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PetShop Manager</title>

    <!-- CSS corrigido -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <h1>🐾 PetShop Manager</h1>

    <!-- CADASTRAR PRODUTO -->
    <section>
        <h2>Cadastrar Produto</h2>
        <input type="text" id="nome" placeholder="Nome">
        <input type="number" id="preco" placeholder="Preço">
        <input type="number" id="quantidade" placeholder="Quantidade">
        <button onclick="cadastrarProduto()">Cadastrar</button>
    </section>

    <!-- LISTAR PRODUTOS -->
    <section>
        <h2>Produtos</h2>
        <button onclick="listarProdutos()">Atualizar</button>
        <ul id="listaProdutos"></ul>
    </section>

    <!-- REGISTRAR VENDA -->
    <section>
        <h2>Registrar Venda</h2>
        <input type="number" id="produto_id" placeholder="ID Produto">
        <input type="number" id="quantidade_venda" placeholder="Quantidade">
        <button onclick="registrarVenda()">Vender</button>
    </section>

    <!-- LISTAR VENDAS -->
    <section>
        <h2>Vendas</h2>
        <button onclick="listarVendas()">Atualizar</button>
        <ul id="listaVendas"></ul>
    </section>

    <!-- JS corrigido -->
    <script src="./js/script.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
